<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Dog Adoption Interest Form</title>
    <link rel="stylesheet" href="adoptme.css">
  </head>
  <body>

    <h1>Dog Adoption Interest Form</h1>
    <form name="adoption" action="" method="post" onsubmit="return validateForm()">
      <h3>Part 1: Personal Information</h3>

      <label for="full-name">Full Name</label>
      <input type="text" id="full-name" name="full-name">
      <span id="fn-error" class="error-msg"></span>      <!-- ← added -->

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone">
      <span id="tel-error" class="error-msg"></span>     <!-- ← added -->

      <label for="email">Email</label>
      <input type="email" id="email" name="email">

      <h3>Part 2: Living Environment</h3>

      <label for="address">Address</label>
      <textarea id="address" name="address" rows="4"></textarea>

      <label for="housing-type">Type of Residence</label>
      <select id="housing-type" name="housing-type">
          <option value="" disabled selected>-- Please select --</option>
          <option value="garden-house">Garden House</option>
          <option value="single-house">Single House</option>
          <option value="townhome">Townhome</option>
          <option value="condo">Condominium / Dormitory</option>
      </select>

      <label>Dog Keeping</label>
      <div class="radio-group">
          <input type="radio" id="indoor" name="dog-location" value="indoor">
          <label for="indoor">Keep dog inside the house</label>
          <input type="radio" id="outdoor" name="dog-location" value="outdoor">
          <label for="outdoor">Keep dog outside the house</label>
      </div>

      <label for="pet-count">Number of Current Pets</label>
      <input type="number" id="pet-count" name="pet-count" min="0">

      <div class="checkbox-group">
          <input type="checkbox" id="consent" name="consent">
          <label for="consent">Submitting this form is an expression of interest only and does not guarantee dog adoption.</label>
      </div>

      <input type="submit" value="Submit Form">
  </form>

    <p class="footer-credit">6833175621 Pongtawan Klysubun</p>
    <script src = "adoptme.js"></script>
  </body>
</html>
